name: Sync Studio Schedule

on:
  schedule:
    - cron: '0,30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run sync script
        env:
          STUDIOASSISTANT_API_TOKEN: ${{ secrets.STUDIOASSISTANT_API_TOKEN }}
        run: node scripts/studioassistant-syncv4.js

      - name: Commit and push schedule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update schedule $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push